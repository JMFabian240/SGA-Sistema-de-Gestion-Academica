<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGA Cargando</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1A2B4A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            animation: pulse 2s infinite ease-in-out;
        }

        .progress-container {
            width: 60%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 1rem;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 30%;
            background-color: #ffffff;
            border-radius: 3px;
            animation: indeterminate 1.5s infinite linear;
            transform-origin: 0% 50%;
        }

        .status-text {
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        @keyframes indeterminate {
            0% { left: -30%; width: 30%; }
            50% { left: 30%; width: 70%; }
            100% { left: 100%; width: 30%; }
        }
    </style>
</head>
<body>
    <div class="logo">SGA</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="status-text" id="status">Iniciando aplicación...</div>

    <script type="module">
        const { listen } = window.__TAURI__.event;
        
        async function setup() {
            await listen('splash-state', (event) => {
                const statusEl = document.getElementById('status');
                if (statusEl) {
                    // Animación suave de cambio de texto
                    statusEl.style.opacity = 0;
                    setTimeout(() => {
                        statusEl.innerText = event.payload;
                        statusEl.style.opacity = 0.8;
                    }, 150);
                }
            });
            
            await listen('splash-error', (event) => {
                const statusEl = document.getElementById('status');
                if (statusEl) {
                    statusEl.innerText = event.payload;
                    statusEl.style.color = '#ff6b6b';
                    document.querySelector('.progress-bar').style.animationPlayState = 'paused';
                    document.querySelector('.progress-bar').style.backgroundColor = '#ff6b6b';
                }
            });
        }
        
        setup().catch(console.error);
    </script>
</body>
</html>
